<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crafting Calculator // OS.SYS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #060a12;       /* Đen không gian sâu */
      --surface:    #0d1527;       /* Xanh đen cơ sở công nghệ */
      --surface2:   #15223c;       /* Thẻ/Hàng nổi bật */
      --border:     #1e355e;       /* Đường viền kết cấu */
      --accent:     #00f0ff;       /* Cyan Neon - Màu chủ đạo Sci-Fi */
      --accent-dim: #00a8b5;       /* Cyan trầm */
      --text:       #c1d1e7;       /* Chữ chính trắng xanh nhẹ */
      --muted:      #566f99;       /* Chữ phụ/Chú thích trầm */
      --green:      #39ff14;       /* Xanh lá Neon (Thời gian) */
      --red:        #ff3131;       /* Đỏ Neon (Chi phí) */
      --radius:     4px;           /* Bo góc sắc nét, góc cạnh kiểu máy móc */
      --font-main: 'Segoe UI', system-ui, monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      min-height: 100vh;
      padding: 2rem 1.25rem 4rem;
      background-image: radial-gradient(circle at 50% 10%, #112547 0%, var(--bg) 70%);
    }

    header { text-align: center; margin-bottom: 3rem; position: relative; }
    header h1 {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
    }
    header p { 
      color: var(--accent); 
      font-size: .75rem; 
      margin-top: .5rem; 
      text-transform: uppercase; 
      letter-spacing: .2em;
      opacity: 0.8;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .15em;
      color: var(--accent);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: .7rem;
    }
    .section-title::after { 
      content: ''; 
      flex: 1; 
      height: 1px; 
      background: linear-gradient(90deg, var(--border), transparent); 
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5rem;
      align-items: start;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 1.5rem;
      background: rgba(13, 21, 39, 0.6);
      backdrop-filter: blur(5px);
      box-shadow: inset 0 0 15px rgba(0, 240, 255, 0.03);
    }
    
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    thead th {
      background: var(--surface2);
      color: #fff;
      padding: .8rem 1rem;
      text-align: left;
      white-space: nowrap;
      border-bottom: 2px solid var(--accent);
      font-weight: 700;
      letter-spacing: .1em;
      font-size: .75rem;
      text-transform: uppercase;
    }
    tbody tr { border-bottom: 1px solid rgba(30, 53, 94, 0.5); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(21, 34, 60, 0.6); }
    tbody td { padding: .75rem 1rem; vertical-align: middle; }

    /* Controls cải tiến gọn gàng, không bị tù túng */
    select, input[type="number"], input[type="text"] {
      background: #090e1a;
      color: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .45rem .6rem;
      font-size: .85rem;
      font-family: var(--font-main);
      outline: none;
      transition: all .2s;
      width: 100%;
    }
    select:focus, input[type="number"]:focus, input[type="text"]:focus { 
      border-color: var(--accent); 
      box-shadow: 0 0 8px rgba(0, 240, 255, 0.3);
    }

    /* Form tối giản thành một khối thống nhất */
    .add-item-form {
      display: grid;
      grid-template-columns: 1.5fr 1.5fr 1fr 1.5fr;
      gap: .6rem;
      margin-bottom: 1.5rem;
      background: var(--surface);
      padding: 1rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    /* Khối kết quả hiển thị dạng Hologram / Terminal */
    .resource-cell { font-size: .8rem; line-height: 1.8; min-width: 220px; }
    .resource-cell .label {
      color: var(--muted);
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .resource-cell .value { color: #fff; font-weight: 500; }
    .resource-cell .value.highlight { color: var(--accent); font-weight: 700; text-shadow: 0 0 5px rgba(0,240,255,0.3); }
    .resource-cell .value.cost     { color: var(--red);    font-weight: 700; }
    .resource-cell .value.hours    { color: var(--green);  font-weight: 700; }
    .resource-cell hr { border: none; border-top: 1px solid rgba(30, 53, 94, 0.4); margin: .4rem 0; }

    /* Thiết kế Button kiểu góc cạnh Sci-Fi */
    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .55rem 1.2rem;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      transition: all .2s;
      margin-bottom: 2rem;
    }
    .btn-add:hover { 
      background: rgba(0, 240, 255, 0.1); 
      box-shadow: 0 0 12px rgba(0, 240, 255, 0.4);
      color: #fff;
    }

    .btn-remove {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 0 .3rem;
      transition: color .2s;
    }
    .btn-remove:hover { color: var(--red); text-shadow: 0 0 5px rgba(255,49,49,0.5); }

    .badge-custom {
      background: rgba(0, 240, 255, 0.1);
      color: var(--accent);
      border: 1px solid rgba(0, 240, 255, 0.3);
      padding: 1px 5px;
      border-radius: 2px;
      font-size: 0.65rem;
      font-weight: bold;
      text-transform: uppercase;
    }

    #status { text-align: center; padding: 3rem; color: var(--accent); font-size: .8rem; letter-spacing: .1em; }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(0, 240, 255, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { color: var(--red); }

    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr; gap: 1.5rem; }
      .add-item-form { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      header h1 { font-size: 1.3rem; letter-spacing: .1em; }
      tbody td, thead th { padding: .6rem .8rem; }
      .add-item-form { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>⚙ Workshop</h1>
  <p>System Status: Online</p>
</header>

<div id="status"><span class="spinner"></span> ACCESSING DATABASE_GOOGLESHEETS...</div>

<div id="app" style="display:none">

  <div class="section-title">🏭 WORKSHOP OVERVIEW</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>Workshop Name</th><th>Credits / Hour</th><th>Points / Hour</th></tr>
      </thead>
      <tbody id="workshop-body"></tbody>
    </table>
  </div>

  <div class="main-grid">
    
    <div>
      <div class="section-title">📦 ITEM DATABASE</div>
      
      <div class="table-wrap" style="margin-bottom: 1rem;">
        <table>
          <thead>
            <tr>
              <th>Item Name</th>
              <th>Required Materials</th>
              <th style="text-align: right; width: 100px;">Points</th>
              <th>Notes</th>
              <th style="width: 75px;"></th>
            </tr>
          </thead>
          <tbody id="items-body"></tbody>
          <tbody id="items-inline-form-body"></tbody>
        </table>
      </div>
      
      <button class="btn-add" onclick="addCustomItemRow()" style="width: 100%; justify-content: center;">
        [+] REGISTER NEW CUSTOM PROTOCOL
      </button>
    </div>

    <div>
      <div class="section-title">⚙️ MANUFACTURING PLAN</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="min-width:150px">Selected Item</th>
              <th style="width:90px">Quantity</th>
              <th style="min-width:220px">Calculated Resource Output</th>
              <th style="width:36px"></th>
            </tr>
          </thead>
          <tbody id="crafting-body"></tbody>
        </table>
      </div>
      <button class="btn-add" onclick="addCraftRow()">[+] ADD NEW PROTOCOL</button>
    </div>

  </div>

  <div class="section-title" style="margin-top: 2rem;">💎 CORE RARITY VALUES</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr id="rarity-header"></tr>
      </thead>
      <tbody id="rarity-body"></tbody>
    </table>
  </div>

</div>

<script type="module">
import { fetchAll } from "./sheets-data.js";

let workshops = [];
let items = [];
let defaultMaterials = [];
let rowCount = 0;

function renderWorkshops() {
  const tbody = document.getElementById("workshop-body");
  if (!workshops.length) {
    tbody.innerHTML = `<tr><td colspan="3" style="color:var(--muted);text-align:center;padding:1rem">No workshop telemetry found.</td></tr>`;
    return;
  }
  tbody.innerHTML = workshops.map(w => `
    <tr>
      <td><strong>${esc(w.name)}</strong></td>
      <td><span style="color:var(--red);font-weight:700">${fmt(w.costPerHour)}</span></td>
      <td><span style="color:var(--green);font-weight:700">${fmt(w.pointsPerHour)}</span></td>
    </tr>
  `).join("");
}

function renderItemsTable() {
  const tbody = document.getElementById("items-body");
  if (!items.length) {
    tbody.innerHTML = `<tr><td colspan="5" style="color:var(--muted);text-align:center;padding:1rem">Database empty.</td></tr>`;
    return;
  }
  tbody.innerHTML = items.map((it, idx) => `
    <tr>
      <td>
        <strong>${esc(it.name)}</strong> 
        ${it.isCustom ? '<span class="badge-custom">Sim</span>' : ''}
      </td>
      <td style="font-size: 0.8rem; color: var(--muted);">${esc(it.materials || '—')}</td>
      <td style="text-align: right; font-weight: 600; color: var(--accent);">${fmt(it.pointsNeeded)}</td>
      <td style="font-size: 0.8rem; color: var(--muted); max-width: 150px;">${esc(it.note || '—')}</td>
      <td>
        ${it.isCustom ? `<button class="btn-remove" onclick="removeCustomItem(${idx})" title="Erase item">✕</button>` : ''}
      </td>
    </tr>
  `).join("");
}

function renderDefaultMaterials() {
  const theadRow = document.getElementById("rarity-header");
  const tbody = document.getElementById("rarity-body");
  if (!defaultMaterials.length) {
    theadRow.innerHTML = `<th>No rarity configuration found.</th>`;
    return;
  }
  theadRow.innerHTML = defaultMaterials.map(d => `<th>${esc(d.rarity)}</th>`).join("");
  tbody.innerHTML = `<tr>${defaultMaterials.map(d => `<td style="font-weight:700; color:var(--accent)">${fmt(d.points)} PTS</td>`).join("")}</tr>`;
}

function refreshAllDropdowns() {
  const selects = document.querySelectorAll(`[id^="sel-"]`);
  selects.forEach(selectEl => {
    const currentVal = selectEl.value;
    selectEl.innerHTML = `<option value="">-- Select Item --</option>` + 
      items.map(it => `<option value="${esc(it.name)}" ${it.name === currentVal ? "selected" : ""}>${esc(it.name)}</option>`).join("");
  });
}

window.handleCreateCustomItem = function(e) {
  e.preventDefault();
  const nameEl = document.getElementById("c-name");
  const matsEl = document.getElementById("c-mats");
  const pointsEl = document.getElementById("c-points");
  const noteEl = document.getElementById("c-note");

  const name = nameEl.value.trim();
  if (items.some(it => it.name.toLowerCase() === name.toLowerCase())) {
  
    return;
  }

  const newItem = {
    name: name,
    materials: matsEl.value.trim(),
    pointsNeeded: parseFloat(pointsEl.value) || 0,
    note: noteEl.value.trim(),
    isCustom: true
  };

  items.push(newItem);
  renderItemsTable();
  refreshAllDropdowns();
  document.getElementById("custom-item-form").reset();
};

window.removeCustomItem = function(index) {
  const targetItem = items[index];
  if (!targetItem || !targetItem.isCustom) return;
  
  // Nếu có dòng nào ở bảng Crafting đang chọn item này, reset dòng đó về trống
  const selects = document.querySelectorAll(`[id^="sel-"]`);
  selects.forEach(sel => {
    if (sel.value === targetItem.name) {
      sel.value = "";
      const rowId = sel.id.replace("sel-", "");
      updateRow(rowId);
    }
  });

  items.splice(index, 1);
  renderItemsTable();
  refreshAllDropdowns();
};

window.addCraftRow = function (itemName = "", qty = 1) {
  rowCount++;
  const id = rowCount;
  const tbody = document.getElementById("crafting-body");
  const tr = document.createElement("tr");
  tr.id = `row-${id}`;
  
  const optionsHtml = items.map(it => `<option value="${esc(it.name)}" ${it.name === itemName ? "selected" : ""}>${esc(it.name)}</option>`).join("");

  tr.innerHTML = `
    <td>
      <select id="sel-${id}" onchange="updateRow(${id})">
        <option value="">-- Select Item --</option>
        ${optionsHtml}
      </select>
    </td>
    <td>
      <input type="number" id="qty-${id}" min="1" value="${qty}"
        oninput="updateRow(${id})" onchange="updateRow(${id})" />
    </td>
    <td class="resource-cell" id="res-${id}">
      <span style="color:var(--muted);font-size:.8rem"><- Waiting for item selection</span>
    </td>
    <td><button class="btn-remove" onclick="removeRow(${id})" title="Purge row">✕</button></td>
  `;
  tbody.appendChild(tr);
  if (itemName) updateRow(id);
};

window.removeRow = function (id) {
  document.getElementById(`row-${id}`)?.remove();
};

window.updateRow = function (id) {
  const selEl = document.getElementById(`sel-${id}`);
  const qtyEl = document.getElementById(`qty-${id}`);
  const resEl = document.getElementById(`res-${id}`);
  if (!selEl || !qtyEl || !resEl) return;

  const name = selEl.value;
  const parsedQty = parseInt(qtyEl.value);
  const qty  = Math.max(1, isNaN(parsedQty) ? 1 : parsedQty);

  if (!name) {
    resEl.innerHTML = `<span style="color:var(--muted);font-size:.8rem"><- Waiting for item selection</span>`;
    return;
  }

  const item = items.find(it => it.name === name);
  if (!item) return;

  const totalPoints = item.pointsNeeded * qty;
  const matLine = scaleMaterials(item.materials, qty);

  let workshopBlock;
  if (workshops.length > 1) {
    workshopBlock = workshops.map(w => {
      const h = w.pointsPerHour > 0 ? (totalPoints / w.pointsPerHour) : 0;
      const c = w.costPerHour * h;
      return `<span class="label">${esc(w.name)}</span><br>
        <span class="value hours">${fmtNum(h)} H</span>
        &nbsp;·&nbsp;
        <span class="value cost">${fmt(c)} CR</span>`;
    }).join("<hr>");
  } else if (workshops.length === 1) {
    const ws = workshops[0];
    const hours = ws.pointsPerHour > 0 ? totalPoints / ws.pointsPerHour : 0;
    const cost  = ws.costPerHour * hours;
    workshopBlock = `
      <span class="label">Time Est. (${esc(ws.name)})</span><br>
      <span class="value hours">${fmtNum(hours)} H</span>
      <hr>
      <span class="label">Cost Est.</span><br>
      <span class="value cost">${fmt(cost)} CR</span>`;
  } else {
    workshopBlock = `<span class="label" style="color:var(--red)">Telemetry error</span>`;
  }

  resEl.innerHTML = `
    <span class="label">Total Points</span><br>
    <span class="value highlight">${fmt(totalPoints)} PTS</span>
    <hr>
    ${workshopBlock}
    ${matLine ? `<hr><span class="label">Required Materials</span><br><span class="value">${matLine}</span>` : ""}
    ${item.note ? `<hr><span class="label" style="color:var(--accent)">System Note</span><br><span class="value" style="color:var(--muted)">${esc(item.note)}</span>` : ""}
  `;
};

function scaleMaterials(raw, qty) {
  if (!raw) return "";
  const parts = raw.split(/[,;\n]+/).map(s => s.trim()).filter(Boolean);

  return parts.map(part => {
    let m = part.match(/^(\d+(?:[.,]\d+)?)\s*[xX×]?\s+(.+)$/);
    if (m) return `${fmt(parseNum(m[1]) * qty)} ${esc(m[2])}`;

    m = part.match(/^(.+?)\s*[xX×]\s*(\d+(?:[.,]\d+)?)$/);
    if (m) return `${esc(m[1])} x${fmt(parseNum(m[2]) * qty)}`;

    const def = defaultMaterials.find(d => d.rarity.toLowerCase() === part.toLowerCase());
    if (def) {
      return `${esc(part)} x${fmt(qty)} <span style="color:var(--muted)">(${fmt(def.points)} pts/u)</span>`;
    }

    return esc(part);
  }).join("<br>");
}

function esc(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function parseNum(str) {
  if (!str) return 0;
  return parseFloat(String(str).replace(/[^\d.,-]/g,'').replace(',','.')) || 0;
}
function fmt(n) {
  if (n === undefined || n === null || isNaN(n)) return "—";
  return n % 1 === 0 ? n.toLocaleString("en-US") : n.toLocaleString("en-US", { maximumFractionDigits: 2 });
}
function fmtNum(n) {
  if (!n || isNaN(n)) return "0";
  return n % 1 === 0 ? String(n) : n.toFixed(2);
}

(async function init() {
  const status = document.getElementById("status");
  try {
    const data = await fetchAll();
    workshops = data.workshops;
    items = data.items;
    defaultMaterials = data.defaultMaterials;

    renderWorkshops();
    renderItemsTable();
    renderDefaultMaterials();
    addCraftRow();

    status.style.display = "none";
    document.getElementById("app").style.display = "block";
  } catch (err) {
    status.innerHTML = `<span class="error-msg">❌ INTERRUPT: LOAD FAILED. ${esc(err.message)}</span>`;
    console.error(err);
  }
})();
</script>
</body>
</html>
